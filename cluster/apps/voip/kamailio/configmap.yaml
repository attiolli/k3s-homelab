apiVersion: v1
kind: ConfigMap
metadata:
  name: kamailio-config
  namespace: voip
data:
  kamailio.cfg: |
    #!KAMAILIO

    ####### Global Parameters #########
    debug=2
    log_stderror=no
    log_facility=LOG_LOCAL0
    fork=yes
    children=4

    # PSTN GW - replaced at startup from secret
    #!define PSTN_GW "PSTN_GW_IP_PLACEHOLDER"

    # ------------------ module loading ----------------------------------
    mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

    loadmodule "kex.so"
    loadmodule "corex.so"
    loadmodule "tm.so"
    loadmodule "tmx.so"
    loadmodule "sl.so"
    loadmodule "rr.so"
    loadmodule "pv.so"
    loadmodule "maxfwd.so"
    loadmodule "textops.so"
    loadmodule "siputils.so"
    loadmodule "xlog.so"
    loadmodule "sanity.so"
    loadmodule "ctl.so"
    loadmodule "jsonrpcs.so"

    # ----------------- setting module-specific parameters ---------------
    modparam("tm", "failure_reply_mode", 3)
    modparam("tm", "fr_timer", 30000)
    modparam("tm", "fr_inv_timer", 120000)
    modparam("rr", "enable_full_lr", 1)

    ####### Routing Logic ########
    request_route {
        route(REQINIT);

        if (!is_method("ACK")) {
            if(t_precheck_trans()) {
                t_check_trans();
                exit;
            }
            t_check_trans();
        }

        route(WITHINDLG);
        route(RECORD_ROUTE);
        route(PSTN);
    }

    route[REQINIT] {
        if (!mf_process_maxfwd_header(10)) {
            sl_send_reply("483","Too Many Hops");
            exit;
        }
        if (!sanity_check("17895", "7")) {
            xlog("Malformed SIP request from $si:$sp\n");
            exit;
        }
    }

    route[WITHINDLG] {
        if (!has_totag()) return;
        if (loose_route()) {
            route(RELAY);
            exit;
        }
        if (is_method("SUBSCRIBE")) {
            sl_send_reply("200", "OK");
            exit;
        }
        if (is_method("ACK")) {
            if (t_check_trans()) {
                route(RELAY);
                exit;
            } else {
                exit;
            }
        }
        sl_send_reply("404","Not here");
        exit;
    }

    route[RECORD_ROUTE] {
        if (is_method("INVITE|SUBSCRIBE")) {
            record_route();
        }
    }

    route[RELAY] {
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }

    route[PSTN] {
        $du = "sip:PSTN_GW_IP_PLACEHOLDER:5060";
        xlog("L_INFO", "Forwarding to PSTN GW: $du\n");
        route(RELAY);
    }
