apiVersion: v1
kind: Service
metadata:
  name: kamailio
  namespace: voip
  annotations:
    metallb.io/loadBalancerIPs: 10.0.44.1
spec:
  type: LoadBalancer
  selector:
    app: kamailio
  ports:
    - name: sip-udp
      port: 5060
      targetPort: 5060
      protocol: UDP
    - name: sip-tcp
      port: 5060
      targetPort: 5060
      protocol: TCP
