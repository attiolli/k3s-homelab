apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamailio
  namespace: voip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kamailio
  template:
    metadata:
      labels:
        app: kamailio
    spec:
      containers:
        - name: kamailio
          image: ghcr.io/kamailio/kamailio:6.0.1-bookworm
          imagePullPolicy: IfNotPresent
          ports:
            - name: sip-udp
              containerPort: 5060
              protocol: UDP
            - name: sip-tcp
              containerPort: 5060
              protocol: TCP
          env:
            - name: PSTN_GW_IP
              valueFrom:
                secretKeyRef:
                  name: kamailio-secret
                  key: PSTN_GW_IP
          command:
            - /bin/sh
            - -c
            - |
              cp /etc/kamailio-config/* /tmp/kamailio/
              sed -i "s/PSTN_GW_IP_PLACEHOLDER/$PSTN_GW_IP/g" /tmp/kamailio/kamailio.cfg
              kamailio -f /tmp/kamailio/kamailio.cfg -DD -E
          volumeMounts:
            - name: config
              mountPath: /etc/kamailio-config
              readOnly: true
            - name: kamailio-run
              mountPath: /tmp/kamailio
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      initContainers:
        - name: init-config
          image: busybox
          command:
            - sh
            - -c
            - mkdir -p /tmp/kamailio
          volumeMounts:
            - name: kamailio-run
              mountPath: /tmp/kamailio
      volumes:
        - name: config
          configMap:
            name: kamailio-config
        - name: kamailio-run
          emptyDir: {}
